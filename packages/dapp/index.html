<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebula — Confidential Tokens on Stellar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script>
      // Must run BEFORE any module loads. React 19 dev mode JSON.stringify's
      // component state when logging renders; our state contains BabyJubJub
      // points as bigint, and BigInt has no default JSON serializer. The
      // resulting throw mid-commit corrupts React's scheduler ("Should not
      // already be working" on the next tick). Polyfill BigInt#toJSON
      // globally so JSON.stringify(123n) returns "123".
      if (!("toJSON" in BigInt.prototype)) {
        Object.defineProperty(BigInt.prototype, "toJSON", {
          value: function () { return this.toString(); },
          configurable: true,
          writable: true,
        });
      }
    </script>
    <style>
      body {
        margin: 0;
        background: #06080c;
        color: #eef1f6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
